<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212; /* Dark Background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Profile Card Container */
        .profile-card {
            background: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* Image Styles */
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00adb5; /* Accent Color Border */
            margin-bottom: 20px;
        }

        /* Typography */
        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 1rem;
            color: #00adb5; /* Cyan accent */
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .intro-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #b3b3b3;
            margin-bottom: 25px;
            text-align: justify;
        }

        /* Decorative Divider */
        .divider {
            height: 2px;
            width: 50px;
            background-color: #00adb5;
            margin: 0 auto 25px auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="Screenshot_20260617021153.png"alt="My Profile Picture" class="profile-pic">
        
        <h1>Muhmmad Ahmed Raza</h1>
        
        <p class="subtitle">Digital Marketer & Designer</p>
        
        <div class="divider"></div>
        
        <p class="intro-text">
